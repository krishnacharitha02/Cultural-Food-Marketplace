<!DOCTYPE html>
<html>
<head>
    <title>Vendor Login</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="topbar">
    <a href="/" class="logo">🍽 Cultural Food Market 🍽</a>
</div>

<div class="container" style="max-width: 420px;">
    <h1>Vendor Login</h1>
    <div class="card">
        <form action="/vendor_login" method="POST">
            <label>Email</label>
            <input type="email" name="email" placeholder="business@email.com" required>
            <label>Password</label>
            <input type="password" name="password" placeholder="Password" required>
            <button type="submit" class="btn" style="width: 100%;">Login</button>
        </form>
    </div>
    <p style="text-align: center; font-family: Arial, sans-serif; font-size: 14px; margin-top: 12px;">
        Don't have an account? <a href="/register_vendor">Register here</a>
    </p>
</div>

</body>
</html>
