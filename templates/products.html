<h1>Products</h1>

<a href="/customer">Back</a>

{% for p in products %}
    <p>{{ p[3] }} - ${{ p[5] }} </p>

    <form action="/add_cart" method="POST">
        <input type="hidden" name="product_id" value="{{ p[0] }}">
        <input type="number" name="quantity" placeholder="Qty">
        <button type="submit">Add to Cart</button>
    </form>

    <a href="/review/{{ p[0] }}">Leave a Review</a><br><br>

{% endfor %}
