<!DOCTYPE html>
<html>
<head>
    <title>Your Cart</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="topbar">
    <a href="/" class="logo">🍽 Cultural Food Market 🍽</a>
    <div class="nav-links">
        <a href="/customer">Dashboard</a>
        <a href="/logout">Logout</a>
    </div>
</div>

<div class="container">
    <h1>Your Cart</h1>

    {% if cart %}
        <!-- FIX 4: item[2] is cart_item_id (added to get_cart query in app.py) -->
        {% for item in cart %}
        <div class="card" style="display: flex; justify-content: space-between; align-items: center;">
            <span style="font-family: Arial, sans-serif;">{{ item[0] }}</span>
            <span style="color: #8b5e3c; font-family: Arial, sans-serif;">Qty: {{ item[1] }}</span>
            <form action="/delete_cart_item/{{ item[2] }}" method="POST" style="margin: 0;">
                <button type="submit" class="btn" style="background: #c0392b; font-size: 12px; padding: 6px 14px;">🗑 Remove</button>
            </form>
        </div>
        {% endfor %}
        <form action="/place_order" method="POST" style="margin-top: 16px;">
            <button type="submit" class="btn">Place Order</button>
        </form>
    {% else %}
        <p style="font-family: Arial, sans-serif; color: #8b5e3c;">Your cart is empty.</p>
    {% endif %}

    <div style="margin-top: 20px;">
        <a href="/customer">Back to Dashboard</a>
    </div>
</div>

</body>
</html>
