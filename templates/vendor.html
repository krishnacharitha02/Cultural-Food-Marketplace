<!--adding products-->
<h2>Add Product</h2>
<form action="/add_product" method="POST">
    <input type="text" name="name" placeholder="Product Name"><br><br>
    <input type="text" name="description" placeholder="Description"><br><br>
    <input type="number" step="0.01" name="price" placeholder="Price"><br><br>
    <input type="number" name="stock" placeholder="Stock Quantity"><br><br>

    <label>Cuisine Type:</label>
    <select name="cuisine_type_id">
        <option value="1">Indian</option>
        <option value="2">Korean</option>
        <option value="3">Italian</option>
        <option value="4">Mexican</option>
    </select><br><br>

    <button type="submit">Add Product</button>
</form>
