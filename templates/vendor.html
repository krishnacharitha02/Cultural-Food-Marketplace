<!DOCTYPE html>
<html>
<head>
    <title>Vendor Dashboard</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="topbar">
    <a href="/" class="logo">🍽 Cultural Food Market 🍽</a>
    <div class="nav-links">
        <a href="/products">Products</a>
        <a href="/logout">Logout</a>
    </div>
</div>

<div class="container">
    <h1>Vendor Dashboard</h1>
    <p style="font-family: Arial, sans-serif; color: #ad632b; margin-bottom: 20px;">Welcome, {{ session.get('vendor_name', 'Vendor') }}!</p>

    <h2>Add a Product</h2>
    <div class="card">
        <form action="/add_products" method="POST">
            <label>Product Name</label>
            <input type="text" name="prod_name" placeholder="Product name" required>
            <label>Description</label>
            <input type="text" name="prod_description" placeholder="Description">
            <label>Price</label>
            <input type="number" step="0.01" name="price" placeholder="0.00" required>
            <label>Stock Quantity</label>
            <input type="number" name="stock_quantity" placeholder="Qty" required>
            <label>Cuisine Type</label>
            <select name="cuisine_type_id">
                {% for c in cuisines %}
                <option value="{{ c[0] }}">{{ c[1] }}</option>
                {% endfor %}
            </select>
            <label>Dietary Tags</label>
            {% for d in dietary_tags %}
            <label style="display: flex; align-items: center; gap: 8px; margin-bottom: 6px;">
                <input type="checkbox" name="dietary_tags" value="{{ d[0] }}" style="width: auto; margin-bottom: 0;">
                {{ d[1] }}
            </label>
            {% endfor %}
            <button type="submit" class="btn" style="margin-top: 10px;">Add Product</button>
        </form>
    </div>

    <h2>Add New Cuisine Type</h2>
    <div class="card">
        <form action="/add_cuisine" method="POST">
            <label>Cuisine Name</label>
            <input type="text" name="cuisine_name" placeholder="e.g. Thai" required>
            <label>Region</label>
            <input type="text" name="region" placeholder="e.g. Southeast Asia" required>
            <button type="submit" class="btn">Add Cuisine</button>
        </form>
    </div>

    <h2>Add New Dietary Tag</h2>
    <div class="card">
        <form action="/add_dietary" method="POST">
            <label>Tag Name</label>
            <input type="text" name="tag_name" placeholder="e.g. Vegan" required>
            <button type="submit" class="btn">Add Tag</button>
        </form>
    </div>
</div>

</body>
</html>
