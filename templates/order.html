<!DOCTYPE html>
<html>
<head>
    <title>Order Confirmation</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="topbar">
    <a href="/" class="logo">🍽 Cultural Food Market 🍽</a>
</div>

<div class="container">
    <h1>Order Placed!</h1>
    <p style="font-family: Arial, sans-serif; color: #8b5e3c; margin-bottom: 24px;">Thank you! Your order has been placed successfully.</p>

    <div class="card">
        <h2 style="margin-top: 0;">Order Summary</h2>
        {% for item in order_items %}
        <div style="display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #f0e0cc; font-family: Arial, sans-serif;">
            <span>{{ item[0] }} (x{{ item[1] }})</span>
            <span>${{ item[2] }}</span>
        </div>
        {% endfor %}
        <p style="font-size: 18px; font-weight: bold; color: #b5451b; margin-top: 16px; font-family: Arial, sans-serif;">Total: ${{ total }}</p>
    </div>

    <a href="/customer" class="btn" style="margin-top: 16px; display: inline-block;">Back to Dashboard</a>
</div>

</body>
</html>
